<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syros Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f8fb;--card:#fff;--text:#102033;--muted:#66788f;--line:#dde6ef;--blue:#0b6cf0;--blue2:#eaf2ff;--shadow:0 12px 30px rgba(16,32,51,.08);--r:18px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
.page{display:none;min-height:100vh}
.page.active{display:block}
.wrap{max-width:1120px;margin:0 auto;padding:24px 20px 40px}
.home{display:grid;place-items:center;min-height:100vh;padding:24px}
.home-inner{width:min(980px,100%)}
.home h1{font-size:clamp(2.6rem,8vw,5.5rem);line-height:1;text-align:center;margin-bottom:8px}
.home p{text-align:center;color:var(--muted);margin-bottom:28px;font-size:1.02rem}
.home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.home-card{display:block;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;text-decoration:none;box-shadow:var(--shadow);transition:transform .15s}
.home-card:hover{transform:translateY(-2px)}
.home-image{aspect-ratio:4/3;background:#dbe8f7}
.home-image img{width:100%;height:100%;object-fit:cover;display:block}
.home-body{padding:16px}
.home-title{font-size:1.35rem;font-weight:700}
.home-meta{color:var(--muted);margin-top:4px}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.back{text-decoration:none;color:var(--muted);font-weight:600}
.section-title{font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.05}
.tools{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 10px}
input,select{border:1px solid var(--line);background:#fff;border-radius:999px;padding:12px 14px;font:inherit;color:var(--text)}
input{flex:1;min-width:220px}
.count{color:var(--muted);font-size:.95rem;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.card.hidden{display:none}
.image{aspect-ratio:16/10;background:#e7eef7}
.image img{width:100%;height:100%;object-fit:cover;display:block}
.body{padding:14px;display:flex;flex-direction:column;gap:10px;flex:1}
.name{font-size:1.18rem;font-weight:700;line-height:1.15}
.meta{font-size:.84rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.desc{font-size:.96rem;color:#344861;line-height:1.45}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:.8rem;background:var(--blue2);color:var(--blue);padding:5px 9px;border-radius:999px}
.footer{padding:0 14px 14px}
.btn{display:inline-block;width:100%;text-align:center;background:var(--blue);color:#fff;text-decoration:none;padding:11px 14px;border-radius:12px;font-weight:600}
@media (max-width:860px){.home-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<section id="home" class="page active home">
  <div class="home-inner">
    <h1>Syros</h1>
    <p>Beaches, restaurants, bars.</p>
    <div class="home-grid">
      <a class="home-card" href="#beaches">
        <div class="home-image"><img src="images/beaches/galissas.jpg" alt="Beaches"></div>
        <div class="home-body"><div class="home-title">Beaches</div><div class="home-meta">30 spots</div></div>
      </a>
      <a class="home-card" href="#restaurants">
        <div class="home-image"><img src="images/restaurants/tsipouradiko.jpg" alt="Restaurants"></div>
        <div class="home-body"><div class="home-title">Restaurants</div><div class="home-meta">20 spots</div></div>
      </a>
      <a class="home-card" href="#bars">
        <div class="home-image"><img src="images/bars/theosis.jpg" alt="Bars"></div>
        <div class="home-body"><div class="home-title">Bars</div><div class="home-meta">18 spots</div></div>
      </a>
    </div>
  </div>
</section>

<section id="beaches" class="page"><div class="wrap">
  <div class="top"><a class="back" href="#home">← Home</a><h2 class="section-title">Beaches</h2></div>
  <div class="tools"><input id="beaches-search" placeholder="Search..."><select id="beaches-filter"><option value="all">All</option><option value="organized">Well organised</option><option value="partial">Partially organised</option><option value="secluded">Secluded</option></select></div>
  <div class="count" id="beaches-count">30 spots</div><div class="grid" id="beaches-grid"></div>
</div></section>

<section id="restaurants" class="page"><div class="wrap">
  <div class="top"><a class="back" href="#home">← Home</a><h2 class="section-title">Restaurants</h2></div>
  <div class="tools"><input id="restaurants-search" placeholder="Search..."><select id="restaurants-filter"><option value="all">All</option><option value="greek">Greek taverna</option><option value="seafood">Seafood</option><option value="fine">Fine dining</option><option value="italian">Italian</option><option value="international">International</option><option value="souvlaki">Souvlaki</option><option value="brunch">Brunch</option></select></div>
  <div class="count" id="restaurants-count">20 spots</div><div class="grid" id="restaurants-grid"></div>
</div></section>

<section id="bars" class="page"><div class="wrap">
  <div class="top"><a class="back" href="#home">← Home</a><h2 class="section-title">Bars</h2></div>
  <div class="tools"><input id="bars-search" placeholder="Search..."><select id="bars-filter"><option value="all">All</option><option value="cocktail">Cocktail bar</option><option value="wine">Wine bar</option><option value="beachbar">Beach bar</option><option value="dance">Dance / nightclub</option></select></div>
  <div class="count" id="bars-count">18 spots</div><div class="grid" id="bars-grid"></div>
</div></section>

<script>

na","desc":"Hidden spot near the shipyard.","tags":["Hidden","Value"],"filter":"greek","img":"images/restaurants/espermethentiv.jpg","map":"Espermethentiv restaurant Ermoupoli Syros"},{"name":"Mammo","meta":"Ermoupoli \u00b7 Brunch","desc":"Busy harbour all-day spot.","tags":["Harbour","All-day"],"filter":"brunch","img":"images/restaurants/mammo.jpg","map":"Mammo restaurant Ermoupoli Syros"},{"name":"Gnision Souvlaki","meta":"Ermoupoli \u00b7 Souvlaki","desc":"Cheap and quick gyros.","tags":["Gyros","Takeaway"],"filter":"souvlaki","img":"images/restaurants/gnision-souvlaki.jpg","map":"Gnision Souvlaki Ermoupoli Syros"},{"name":"Kamarias","meta":"Ermoupoli \u00b7 Souvlaki","desc":"Handmade gyros and souvlaki.","tags":["Gyros","Chicken Souvlaki"],"filter":"souvlaki","img":"images/restaurants/kamarias.jpg","map":"Kamarias souvlaki Ermoupoli Syros"}],"bars":[{"name":"MouSouTou","meta":"Ermoupoli \u00b7 Cocktail Bar","desc":"House gin and good cocktails.","tags":["Cocktails"],"filter":"cocktail","img":"images/bars/mousoutou.jpg","map":"MouSouTou bar Ermoupoli Syros"},{"name":"Theosis Bar","meta":"Ano Syros \u00b7 Cocktail Bar","desc":"Most popular Ano Syros bar.","tags":["Ano Syros","Popular"],"filter":"cocktail","img":"images/bars/theosis.jpg","map":"Theosis Bar Ano Syros"},{"name":"Kouchico","meta":"Ermoupoli \u00b7 Cocktail Bar","desc":"Craft cocktails near the port.","tags":["Craft","Late Night"],"filter":"cocktail","img":"images/bars/kouchico.jpg","map":"Kouchico bar Ermoupoli Syros"},{"name":"Roga Syros","meta":"Ermoupoli \u00b7 Wine Bar","desc":"Small wine bar with street tables.","tags":["Wine","Orange Wine"],"filter":"wine","img":"images/bars/roga.jpg","map":"Roga wine bar Ermoupoli Syros"},{"name":"Boheme del Mar","meta":"Ermoupoli \u00b7 Cocktail Bar","desc":"Promenade bar for sunset drinks.","tags":["Sunset","Promenade"],"filter":"cocktail","img":"images/bars/boheme-del-mar.jpg","map":"Boheme del Mar bar Ermoupoli Syros"},{"name":"Barrio","meta":"Ermoupoli \u function card(item) {
  const tags = (item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  return `<article class="card" data-filter="${item.filter}" data-search="${(item.name+' '+item.meta+' '+item.desc+' '+(item.tags||[]).join(' ')).toLowerCase()}">
    <div class="image"><img src="${item.img}" alt="${item.name}" loading="lazy"></div>
    <div class="body">
      <div class="name">${item.name}</div>
      <div class="meta">${item.meta}</div>
      <div class="desc">${item.desc}</div>
      <div class="tags">${tags}</div>
    </div>
    <div class="footer"><a class="btn" target="_blank" rel="noopener noreferrer" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.map)}">Open in Google Maps</a></div>
  </article>`;
}

function initSection(key) {
  const grid = document.getElementById(`${key}-grid`);
  const search = document.getElementById(`${key}-search`);
  const filter = document.getElementById(`${key}-filter`);
  const count = document.getElementById(`${key}-count`);
  grid.innerHTML = data[key].map(card).join('');
  const cards = [...grid.querySelectorAll('.card')];
  function update() {
    const q = search.value.toLowerCase().trim();
    const f = filter.value;
    let n = 0;
    cards.forEach(el => {
      const ok = (!q || el.dataset.search.includes(q)) && (f==='all' || el.dataset.filter===f);
      el.classList.toggle('hidden', !ok);
      if(ok) n++;
    });
    count.textContent = `${n} spots`;
  }
  search.addEventListener('input', update);
  filter.addEventListener('change', update);
}

['beaches','restaurants','bars'].forEach(initSection);

function showPage() {
  const id = location.hash.replace('#','') || 'home';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  (document.getElementById(id)||document.getElementById('home')).classList.add('active');
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', showPage);
showPage();
</script>
</body>
</html>
